<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2 id="hospitalTitle"><i class="fa-solid fa-hospital"></i> Hospital</h2>
    <button onclick="showSection('dashboard')"><i class="fa fa-chart-line"></i> Dashboard</button>
    <button onclick="showSection('patients')"><i class="fa fa-user-injured"></i> Patients</button>
    <button onclick="showSection('doctors')"><i class="fa fa-user-md"></i> Doctors</button>
    <button onclick="showSection('appointments')"><i class="fa fa-calendar"></i> Appointments</button>
    <button onclick="showSection('billing')"><i class="fa fa-file-invoice"></i> Billing</button>
    <button onclick="showSection('settings')"><i class="fa fa-gear"></i> Settings</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Dashboard -->
    <div id="dashboard" class="section">
      <h2>Dashboard Overview</h2>
      <div class="cards">
        <div class="card blue">
          <i class="fa fa-user"></i>
          <h3 id="pCount">0</h3>
          <p>Patients</p>
        </div>
        <div class="card green">
          <i class="fa fa-user-md"></i>
          <h3 id="dCount">0</h3>
          <p>Doctors</p>
        </div>
        <div class="card orange">
          <i class="fa fa-calendar-check"></i>
          <h3 id="aCount">0</h3>
          <p>Appointments</p>
        </div>
      </div>
    </div>

    <!-- Patients -->
    <div id="patients" class="section" style="display:none">
      <h2>Patient Management</h2>
      <div class="form-grid">
        <input id="pid" placeholder="Patient ID">
        <input id="pname" placeholder="Name">
        <input id="page" placeholder="Age">
        <select id="pgender">
          <option value="">Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <input id="pphone" placeholder="Phone">
      </div>
      <button onclick="addPatient()">Add / Update Patient</button>
      <input id="pSearch" placeholder="Search Patient" onkeyup="searchPatient()">
      <table id="patientTable"></table>
    </div>

    <!-- Doctors -->
    <div id="doctors" class="section" style="display:none">
      <h2>Doctor Management</h2>
      <div class="form-grid">
        <input id="did" placeholder="Doctor ID">
        <input id="dname" placeholder="Doctor Name">
        <input id="dept" placeholder="Department">
      </div>
      <button onclick="addDoctor()">Add / Update Doctor</button>
      <table id="doctorTable"></table>
    </div>

    <!-- Appointments -->
    <div id="appointments" class="section" style="display:none">
      <h2>Appointment Management</h2>
      <div class="form-grid">
        <input id="aid" placeholder="Appointment ID">
        <input id="apid" placeholder="Patient ID">
        <input id="adid" placeholder="Doctor ID">
        <input type="date" id="adate">
      </div>
      <button onclick="addAppointment()">Book / Update Appointment</button>
      <table id="appointmentTable"></table>
    </div>

    <!-- Billing -->
    <div id="billing" class="section" style="display:none">
      <h2>Billing</h2>
      <div class="form-grid">
        <input id="billPid" placeholder="Patient ID">
        <input id="docFee" placeholder="Doctor Fee">
        <input id="medFee" placeholder="Medicine Charges">
        <input id="roomFee" placeholder="Room Charges">
      </div>
      <button onclick="generateBill()">Generate Bill</button>
      <div id="billArea" class="bill-box"></div>
    </div>

    <!-- Settings -->
    <div id="settings" class="section" style="display:none">
      <h2>Hospital Settings</h2>
      <input id="hospitalInput" placeholder="Enter Hospital Name">
      <button onclick="saveHospital()">Save</button>
    </div>

  </div>
</div>
